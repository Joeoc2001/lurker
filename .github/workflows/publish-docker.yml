name: publish docker image

on:
  push:
    branches:
      - master
  schedule:
    # Run every Sunday at 2 AM UTC to catch dependency updates
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          autocrlf: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update flake.nix hash if stale
        run: |
          BUILD_LOG=$(mktemp)
          nix build .#dockerImage > "$BUILD_LOG" 2>&1 || true

          NEW_HASH=$(grep -oP "got:\s+sha256-[a-zA-Z0-9+/=]+" "$BUILD_LOG" | awk '{print $2}' | head -n 1)

          if [ -n "$NEW_HASH" ]; then
            echo "Hash mismatch detected. Updating outputHash in flake.nix to $NEW_HASH"
            sed -i "s|outputHash = \".*\";|outputHash = \"$NEW_HASH\";|" flake.nix
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add flake.nix
            git commit -m "Update outputHash in flake.nix"
            git push origin HEAD
          else
            echo "Hash is current. No flake.nix update needed."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lurker

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
